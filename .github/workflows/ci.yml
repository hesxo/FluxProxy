# Build image, run Compose stack, Trivy scan; push to Docker Hub on pushes to main.
# Repository secrets: DOCKERHUB_USERNAME, DOCKERHUB_PASSWORD (or Hub access token)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: fluxproxy:latest

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure nginx log directory exists
        run: mkdir -p logs/nginx

      - name: Build Docker image
        run: docker build -t "${{ env.IMAGE_NAME }}" .

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Smoke test (Nginx)
        run: |
          sleep 8
          curl -sf --retry 10 --retry-delay 3 --retry-all-errors http://127.0.0.1:80/ | head -c 500 | grep -q .

      # aquasec/trivy image; skip bundled npm under /usr/local (not app code; fixed in upstream Node images)
      - name: Run Trivy vulnerability scanner
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --scanners vuln \
            --pkg-types os,library \
            --exit-code 1 \
            --ignore-unfixed \
            --skip-dirs usr/local/lib/node_modules/npm \
            --skip-dirs usr/local/lib/node_modules/corepack \
            --format table \
            "${{ env.IMAGE_NAME }}"

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Tag and push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag "${{ env.IMAGE_NAME }}" "${{ secrets.DOCKERHUB_USERNAME }}/fluxproxy:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/fluxproxy:latest"
